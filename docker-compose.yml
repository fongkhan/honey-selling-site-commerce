services:
  postgres:
    image: postgres:16-alpine
    container_name: honey-commerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  redis:
    image: redis:7-alpine
    container_name: honey-commerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  commerce:
    build: .
    container_name: honey-commerce
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://medusa:medusa@postgres:5432/medusa
      REDIS_URL: redis://redis:6379
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres-data:
